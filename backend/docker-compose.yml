# version: "3.8"

services:
    db:
        image: postgres:18 # postgres
        restart: always
        environment:
            POSTGRES_USER: utsav
            POSTGRES_PASSWORD: utsavpass
            POSTGRES_DB: app
        # env_file:
        #     - .env
        ports:
            - "5432:5432" # Map container port 5432 to host port 5432
        volumes:
            - postgres_data:/var/lib/postgresql # Persistent storage for data
    redis:
        image: redis:8.4.0-alpine
        restart: always
        ports:
            - "6379:6379" # my port : container port
        volumes:
            - redis_data:/data
    mail:
        image: mailhog/mailhog
        restart: always
        ports:
            - "1025:1025" # my port : container port
            - "8025:8025" # my port : container port for ui
        env_file:
            - .env
        volumes:
            - mailhog_data:/data

    app:
        build: .
        restart: always
        depends_on:
            - db
            - redis # db and redis start before app
            - mail
        environment:
            POSTGRES_USER: utsav
            POSTGRES_PASSWORD: utsavpass
            POSTGRES_DB: app
        env_file:
            - .env
        ports:
            - "8000:8000"

volumes:
    postgres_data: # Define the named volume for persistence
    redis_data:
        driver: local
    mailhog_data:
        driver: local
